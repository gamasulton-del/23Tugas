<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi To-Do List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    .completed {
      text-decoration: line-through;
      color: #6c757d;
    }
  </style>

  <script src="script.js" defer></script>
</head>

<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body">
            <h3 class="card-title text-center mb-4 text-primary">
              <i class="bi bi-check2-square"></i> My To-Do List
            </h3>

            <form id="todo-form" class="mb-4">
              <div class="input-group">
                <input type="text" id="todo-input" class="form-control" placeholder="Tambah tugas baru..." required />
                <button class="btn btn-primary" type="submit">
                  <i class="bi bi-plus-lg"></i> Tambah
                </button>
              </div>
            </form>

            <ul id="todo-list" class="list-group"></ul>

            <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top text-muted small">
              <span id="todo-count">0 tugas tersisa</span>
              <button id="clear-all" class="btn btn-sm btn-outline-danger d-none">
                Hapus Semua
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
